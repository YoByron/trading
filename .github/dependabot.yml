version: 2
updates:
  # Enable version updates for pip (Python)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
    open-pull-requests-limit: 50
    reviewers:
      - "IgorGanapolsky"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group security advisories together. Dependabot opens security PRs
    # regardless of the `update-types` filter — `applies-to:
    # security-updates` is the correct schema to group security advisories
    # (the prior `update-types: [security]` failed schema validation
    # because Dependabot only accepts major/minor/patch for that field).
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  # Enable version updates for npm (Node.js / Trigger.dev)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "09:00"
    open-pull-requests-limit: 20
    reviewers:
      - "IgorGanapolsky"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      security-updates:
        patterns:
          - "*"
        update-types:
          - "security"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      gh-actions-minor:
        update-types: [minor, patch]
    labels:
      - dependencies
      - github-actions
