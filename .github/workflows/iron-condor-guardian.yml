name: Iron Condor Guardian - Phil Town Rule #1

on:
  # DISABLED: ic_simple.py is the sole position manager (Apr 2026).
  # Guardian had contract-count scaling bugs causing premature exits.
  # schedule:
  #   - cron: 0,30 14-21 * * 1-5
  workflow_dispatch:

# Prevent concurrent trade execution (LL-281 race condition fix)
concurrency:
  group: global-trade-execution
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  guardian:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements-minimal.txt

      - name: Run Iron Condor Guardian
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/iron_condor_guardian.py

      - name: Upload guardian log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: guardian-log-${{ github.run_id }}
          path: data/ic_entries.json
          retention-days: 30
