name: Auto-format Code

on:
  push:
    branches: [main]
    paths:
      - "**.py"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  auto-format:
    name: Auto-format with Ruff
    runs-on: ubuntu-latest
    if: "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'style: Auto-format with ruff') }}"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff format (auto-fix)
        run: ruff format .

      - name: Run Ruff check (auto-fix)
        run: ruff check . --fix || true

      - name: Commit changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No formatting changes needed"
          else
            branch="auto/ruff-format-${{ github.run_id }}"
            git checkout -b "$branch"
            git commit -m "style: Auto-format with ruff"
            git push origin "HEAD:$branch"
            gh pr create \
              --base main \
              --head "$branch" \
              --title "style: auto-format with ruff" \
              --body "Automated Ruff formatting from workflow run ${{ github.run_id }}."
          fi
