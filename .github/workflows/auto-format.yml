name: Auto-format Code

on:
  push:
    branches: [main]
    paths:
      - "**.py"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  auto-format:
    name: Auto-format with Ruff
    runs-on: ubuntu-latest
    if: "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'style: Auto-format with ruff') }}"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff format (auto-fix)
        run: ruff format .

      - name: Run Ruff check (auto-fix)
        run: ruff check . --fix || true

      - name: Commit changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No formatting changes needed"
          else
            branch="auto/ruff-format-${{ github.run_id }}"
            git checkout -b "$branch"
            git commit -m "style: Auto-format with ruff"
            git push origin "HEAD:$branch"
            pr_url="https://github.com/${{ github.repository }}/pull/new/$branch"
            if ! gh pr create \
              --base main \
              --head "$branch" \
              --title "style: auto-format with ruff" \
              --body "Automated Ruff formatting from workflow run ${{ github.run_id }}."; then
              echo "::warning::Branch $branch was pushed but PR creation is blocked for GitHub Actions. Open $pr_url manually."
              {
                echo "## Auto-format PR follow-up"
                echo ""
                echo "Pushed branch \`$branch\` but GitHub Actions could not create the PR automatically."
                echo ""
                echo "Open manually: $pr_url"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
