name: SonarCloud

# Static analysis + code-quality + coverage gating via SonarCloud
# (free tier for public repos). Complements the AI PR review workflow
# (semantic review) and OpenSSF Scorecard (supply-chain). Uses the
# SONAR_TOKEN secret already configured at the repo level.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sonarcloud-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history for blame-based new-code analysis

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sonar-3.11-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sonar-3.11-

      - name: Generate coverage report
        env:
          PYTHON_BIN: python
          REPORT_DIR: artifacts/test-reports
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          chmod +x scripts/ci/run_all_tests.sh
          bash scripts/ci/run_all_tests.sh

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
