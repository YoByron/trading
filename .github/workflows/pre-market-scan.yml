name: Pre-Market Scan

on:
  schedule:
    # Run at 9:00 AM ET (14:00 UTC) on weekdays
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run even if market is closed"
        required: false
        default: "false"

env:
  PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
  ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
  ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}

  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
permissions:
  contents: write

jobs:
  pre-market-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install httpx

      - name: Check if market day
        id: market_check
        run: |
          # Skip weekends unless forced
          DAY_OF_WEEK=$(date +%u)
          FORCE_RUN="${{ github.event.inputs.force_run || 'false' }}"
          if [ "$DAY_OF_WEEK" -gt 5 ] && [ "$FORCE_RUN" != "true" ]; then
            echo "Weekend - skipping scan"
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Run Pre-Market Scan
        if: steps.market_check.outputs.should_run == 'true'
        id: scan
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 scripts/run_perplexity_trading_intel.py --mode pre_market

          python3 << 'EOF'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("data/analysis/perplexity/pre_market_latest.json").read_text())
          print(f"Pre-Market Scan - {report['generated_at_utc']}")
          print(f"Risk Score: {report['risk_score']}")
          print(f"Recommendation: {report['recommendation']}")
          print(f"Reason: {report['gate_contract']['reason']}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"recommendation={report['recommendation']}\n")
              f.write(f"risk_score={report['risk_score']}\n")
          EOF

      - name: Commit analysis
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/analysis/ data/feedback/perplexity_intel_events.jsonl rag_knowledge/lessons_learned/
          git diff --staged --quiet || git commit -m "chore: Pre-market scan $(date +%Y-%m-%d)"
          git push || echo "Nothing to push"

      - name: Summary
        if: steps.market_check.outputs.should_run == 'true'
        run: |
          echo "## Pre-Market Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recommendation**: ${{ steps.scan.outputs.recommendation }}" >> $GITHUB_STEP_SUMMARY
          echo "**Risk Score**: ${{ steps.scan.outputs.risk_score }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See \`data/analysis/pre_market_$(date +%Y-%m-%d).json\` for full intel." >> $GITHUB_STEP_SUMMARY
