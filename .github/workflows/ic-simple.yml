name: IC Simple

on:
  schedule:
    # Entry + exit: 10:00 AM ET (14:00 UTC)
    - cron: "0 14 * * 1-5"
    # Exit check: 2:00 PM ET (18:00 UTC)
    - cron: "0 18 * * 1-5"
    # EOD exit check: 3:30 PM ET (19:30 UTC)
    - cron: "30 19 * * 1-5"
    # Weekend learning: Saturday 10:00 AM ET (14:00 UTC)
    - cron: "0 14 * * 6"
  workflow_dispatch:
    inputs:
      mode:
        description: "entry, exit, both, or status"
        required: false
        default: "both"
      dry_run:
        description: "Dry run (no orders)"
        required: false
        default: "false"

concurrency:
  group: global-trade-execution
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install alpaca-py python-dotenv scipy numpy

      - name: Determine mode
        id: mode
        run: |
          # Dispatch overrides schedule
          MODE="${{ github.event.inputs.mode || 'both' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"

          # On schedule: determine mode by time and day
          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)  # 1=Mon, 6=Sat, 7=Sun
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$DOW" = "6" ]; then
              MODE="learn"  # Saturday = weekend learning
            elif [ "$HOUR" = "14" ]; then
              MODE="both"   # 10 AM ET = entry + exit
            else
              MODE="exit"   # 2 PM / 3:30 PM = exit only
            fi
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "dry_run=$DRY" >> $GITHUB_OUTPUT
          echo "Mode: $MODE, Dry run: $DRY"

      - name: Run IC Simple
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          NORTH_STAR_GUARD_OVERRIDE: "true"  # Paper validation: 5% max per CLAUDE.md
        run: |
          FLAGS="--mode ${{ steps.mode.outputs.mode }}"
          if [ "${{ steps.mode.outputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          python3 scripts/ic_simple.py $FLAGS

      - name: Retrain GRPO model
        if: steps.mode.outputs.mode != 'status' && steps.mode.outputs.dry_run != 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "Retraining GRPO from closed trade history..."
          python3 scripts/run_grpo_training.py || echo "GRPO training skipped (insufficient data or missing deps)"

      - name: Commit trade data
        if: steps.mode.outputs.mode != 'status' && steps.mode.outputs.dry_run != 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/ic_entries.json data/ic_stats.json data/trade_journal.jsonl 2>/dev/null || true
          git add -f data/rag_knowledge/lessons_learned/ 2>/dev/null || true
          git add -f models/ml/grpo_trade_policy.pt models/ml/grpo_trade_metadata.json 2>/dev/null || true
          git add -f data/feedback/trade_trajectories.jsonl 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No trade data changes"
          else
            git commit -m "chore: IC Simple trade data [auto]"
            if [ -n "$GH_PAT" ]; then
              git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
            fi
            git pull --rebase origin main || true
            git push origin HEAD:main || echo "Push failed"
          fi
