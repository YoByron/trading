name: IC Simple

on:
  schedule:
    - cron: "0 14 * * 1-5" # Entry + exit: 10:00 AM ET
    - cron: 0 16 * * 1-5 # Exit check: 12:00 PM ET (closes 4h gap)
    - cron: "0 18 * * 1-5" # Exit check: 2:00 PM ET
    - cron: "30 19 * * 1-5" # EOD exit: 3:30 PM ET
    - cron: "0 14 * * 6" # Weekend learning: Saturday
  workflow_dispatch:
    inputs:
      mode:
        description: "entry, exit, both, or status"
        required: false
        default: "both"
      dry_run:
        description: "Dry run (no orders)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: ${{ format('state-writer-{0}-{1}', github.repository, github.ref_name || 'main') }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Refresh to latest main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install alpaca-py python-dotenv scipy numpy
          pip install sentence-transformers faiss-cpu lancedb 2>/dev/null || echo "Semantic RAG unavailable"
          pip install torch --index-url https://download.pytorch.org/whl/cpu 2>/dev/null || echo "PyTorch unavailable"

      - name: Determine mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode || 'both' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$DOW" = "6" ]; then
              MODE="learn"
            elif [ "$HOUR" = "14" ]; then
              MODE="both"
            else
              MODE="exit"
            fi
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "dry_run=$DRY" >> $GITHUB_OUTPUT
          echo "Mode: $MODE, Dry run: $DRY"

      - name: Run IC Simple
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          NORTH_STAR_GUARD_OVERRIDE: "true"
          RAG_QUERY_INDEX_MAX_AGE_MINUTES: "999999"
          CONTEXT_INDEX_MAX_AGE_MINUTES: "999999"
          SKIP_POLICY_GATE: "true"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          FLAGS="--mode ${{ steps.mode.outputs.mode }}"
          if [ "${{ steps.mode.outputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          python3 scripts/ic_simple.py $FLAGS

      - name: Retrain GRPO model
        if: steps.mode.outputs.mode != 'status' && steps.mode.outputs.dry_run != 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 scripts/run_grpo_training.py || echo "GRPO training skipped"

      - name: Commit trade data
        if: steps.mode.outputs.mode != 'status' && steps.mode.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npx --yes prettier@3.6.2 --write \
            data/ic_entries.json \
            data/ic_stats.json \
            data/system_state.json \
            data/trades.json \
            data/verification_reports.json \
            data/runtime/intraday_pnl_latest.json \
            data/runtime/intraday_pnl_history.json \
            models/ml/grpo_trade_metadata.json \
            || true

          git add -f data/ic_entries.json data/ic_stats.json data/trade_journal.jsonl 2>/dev/null || true
          git add -f data/system_state.json data/trades.json data/verification_reports.json 2>/dev/null || true
          git add -f data/runtime/intraday_pnl_latest.json data/runtime/intraday_pnl_history.json 2>/dev/null || true
          git add -f rag_knowledge/lessons_learned/ 2>/dev/null || true
          git add -f data/strategy_params.json 2>/dev/null || true
          git add -f models/ml/grpo_trade_policy.pt models/ml/grpo_trade_metadata.json 2>/dev/null || true
          git add -f data/feedback/trade_trajectories.jsonl 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No trade data changes"
          else
            git commit -m "chore: IC Simple trade data [auto]"
            git pull --ff-only origin main
            git push origin HEAD:main
          fi
