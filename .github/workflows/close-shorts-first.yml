name: Close Shorts First Strategy

# CRISIS FIX: Close shorts to free margin, then close longs

on:
  workflow_dispatch:
  # DISABLED Jan 23, 2026 - EMERGENCY FIX
  # This was destroying iron condor positions by closing short legs!
  # schedule:
  #   - cron: '*/3 14-21 * * 1-5'
  push:
    paths:
      - ".github/workflows/close-shorts-first.yml"
      - "scripts/close_shorts_first.py"

# Prevent concurrent trade execution (LL-281 race condition fix)
concurrency:
  group: global-trade-execution
  cancel-in-progress: false

permissions:
  contents: write

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  close:
    name: Close Shorts First
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install alpaca-py

      - name: Close Shorts First
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: python scripts/close_shorts_first.py
