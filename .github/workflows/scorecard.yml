name: OpenSSF Scorecard

# Supply-chain security scanner from OpenSSF. Surfaces issues like
# unpinned actions, missing branch protection, lack of code review,
# token permissions, dependency pinning, and signed releases.
# Runs weekly + on default-branch push so the score reflects current
# state. Read-only by default; results uploaded to GitHub Security tab.
# Reference: https://github.com/ossf/scorecard-action

on:
  branch_protection_rule:
  schedule:
    - cron: 0 6 * * 1 # Mondays 06:00 UTC
  push:
    branches:
      - main

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code-scanning
      id-token: write # publish results via OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 30

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: results.sarif
