name: Close Orphan SPY Puts

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'CLOSE' to confirm closing orphan SPY puts"
        required: true
        default: ""

permissions:
  contents: read

# Prevent concurrent trade execution (LL-281 race condition fix)
concurrency:
  group: global-trade-execution
  cancel-in-progress: false

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  close-positions:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'CLOSE' }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install alpaca-py yfinance python-dotenv

      - name: Close Orphan SPY Puts
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          PAPER_TRADING: "true"
        run: |
          python3 scripts/close_orphan_spy_puts.py
