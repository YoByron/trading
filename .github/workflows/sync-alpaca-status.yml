name: Sync Alpaca Status

# Sync frequency:
# - Every 15 minutes during peak hours (10 AM - 3 PM ET = 15-20 UTC)
# - Every 30 minutes during market open/close (9:30-10 AM, 3-4 PM ET)
# - Once daily on weekends to maintain freshness
on:
  schedule:
    - cron: "*/15 15-19 * * 1-5" # Every 15 min, 10 AM - 3 PM ET (peak hours)
    - cron: "45 13 * * 1-5" # 9:45 AM ET — sync before IC Simple entry at 10:00 AM
    - cron: "30 14 * * 1-5" # 10:30 AM ET
    - cron: "0,30 20 * * 1-5" # 4:00/4:30 PM ET — market close
    - cron: "0 15 * * 0,6" # Once daily on weekends at 10 AM ET
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force sync even if no changes"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ format('state-writer-{0}-{1}', github.repository, github.ref_name || 'main') }}
  cancel-in-progress: false

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  sync:
    name: Sync Paper Account Status
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Refresh to latest main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -q -r requirements-minimal.txt || pip install -q alpaca-py requests python-dotenv
          pip install -q torch --index-url https://download.pytorch.org/whl/cpu 2>/dev/null || echo "⚠️ PyTorch not available - GRPO training will use fallback"

      - name: Sync Alpaca state
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          ALPACA_BROKERAGE_TRADING_API_KEY: ${{ secrets.ALPACA_BROKERAGE_TRADING_API_KEY }}
          ALPACA_BROKERAGE_TRADING_API_SECRET: ${{ secrets.ALPACA_BROKERAGE_TRADING_API_SECRET }}
          REQUIRE_ALPACA_KEYS: "true"
        run: |
          python3 scripts/sync_alpaca_state.py
          python3 scripts/sync_closed_positions.py || echo "⚠️ Closed positions sync failed - win rate may be stale"
          python3 scripts/update_ml_from_trades.py || echo "⚠️ ML feedback loop update failed"
          python3 scripts/research_strategies.py || echo "⚠️ Strategy research failed"
          python3 scripts/post_market_analysis.py || echo "⚠️ Post-market analysis failed"
          python3 scripts/update_north_star_operating_plan.py || echo "⚠️ North Star operating plan update failed"

      - name: Restore IC-owned ledger after learning refresh
        run: |
          set -euo pipefail
          # sync_closed_positions.py may refresh data/trades.json for learning, but
          # Sync Alpaca does not own or commit that ledger.
          git restore data/trades.json

      - name: Refresh paired ledger (operator artifacts only)
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          ALPACA_BROKERAGE_TRADING_API_KEY: ${{ secrets.ALPACA_BROKERAGE_TRADING_API_KEY }}
          ALPACA_BROKERAGE_TRADING_API_SECRET: ${{ secrets.ALPACA_BROKERAGE_TRADING_API_SECRET }}
          REQUIRE_ALPACA_KEYS: "true"
        run: |
          python3 scripts/daily_scorecard.py --repo-root .
          # daily_scorecard.py refreshes the paired ledger by default for
          # operator artifacts, but Sync Alpaca does not own data/trades.json.
          git restore data/trades.json
          git diff --quiet -- data/trades.json

      # DISABLED: ic_simple.py is the sole position manager (2026-04-01)
      # manage_iron_condor_positions.py was closing positions via individual legs
      # while ic_simple.py manages them via MLEG — two competing systems caused
      # unexpected position closures and potential P/L loss.
      # - name: Manage Iron Condor Exits (Intraday)
      #   run: python3 scripts/manage_iron_condor_positions.py

      - name: Retrain GRPO Model
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "🧠 Retraining GRPO policy from closed trade history..."
          python3 scripts/run_grpo_training.py || echo "⚠️ GRPO training skipped (insufficient data or missing deps)"

      - name: Commit synced state
        run: |
          set -euo pipefail
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # SYNC-OWNED FILES ONLY — prevents commit races with IC Simple.
          # IC Simple owns: trades.json, ic_entries.json, grpo_*, trade_confidence_model,
          #   feedback_model, trade_trajectories, rag lessons, strategy_params.
          # Sync owns: system_state, pnl snapshots, north_star, public status, wiki, halt.
          npx --yes prettier@3.6.2 --write \
            data/system_state.json \
            data/runtime/intraday_pnl_history.json \
            data/runtime/intraday_pnl_latest.json \
            || true

          git add data/system_state.json
          git add data/runtime/intraday_pnl_history.json 2>/dev/null || true
          git add data/runtime/intraday_pnl_latest.json 2>/dev/null || true
          git add -f data/north_star_weekly_history.json 2>/dev/null || true
          git add data/runtime/north_star_gate_overrides.json 2>/dev/null || true
          git add data/TRADING_HALTED 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes to commit"
            exit 0
          fi

          git commit -m "chore: Sync Alpaca state [auto]"

          if [ -n "${{ secrets.GH_PAT }}" ]; then
            git remote set-url origin "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git"
          fi

          git pull --ff-only origin main
          git push origin HEAD:main

      - name: Notify on Failure
        if: failure()
        continue-on-error: true # Non-critical: notification failure shouldn't change workflow status
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -q requests || true
          python3 scripts/notify_ceo.py --type warning --message "ALPACA SYNC FAILED - Data may become stale. Run: ${{ github.run_id }}. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
