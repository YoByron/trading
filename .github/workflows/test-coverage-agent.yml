name: Test Coverage Agent

on:
  schedule:
    # Run weekly on Sunday at 8 AM ET (13 UTC)
    - cron: "0 13 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  find-gaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest 2>/dev/null || pip install pytest

      - name: Find uncovered modules
        run: python3 scripts/find_uncovered_modules.py

      - name: Upload coverage gaps report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-gaps
          path: data/coverage_gaps.json
