name: Weekly Trading Health Digest

on:
  schedule:
    - cron: "0 14 * * 5" # Every Friday at 10 AM ET
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-minimal.txt

      - name: Refresh broker state
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: |
          python3 scripts/sync_alpaca_state.py || true
          python3 scripts/sync_closed_positions.py || true

      - name: Generate weekly digest
        run: |
          python3 -c "
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          state = json.loads(Path('data/system_state.json').read_text())
          trades = json.loads(Path('data/trades.json').read_text())

          equity = state.get('paper_account', {}).get('equity', 0)
          stats = trades.get('stats', {})
          closed = stats.get('closed_trades', 0)
          win_rate = stats.get('win_rate_pct', 0)
          pf = stats.get('profit_factor', 0)
          total_pnl = stats.get('total_pnl', 0)

          positions = state.get('positions', [])

          # Count validation trades (ic_entries)
          ic_entries = json.loads(Path('data/ic_entries.json').read_text()) if Path('data/ic_entries.json').exists() else {}
          validation_count = len([k for k, v in ic_entries.items() if isinstance(v, dict) and v.get('validation_phase')])

          now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')

          body = f'''## Weekly Trading Health Digest
          Generated: {now}

          ### Account
          | Metric | Value |
          |--------|-------|
          | Paper Equity | \${equity:,.2f} |
          | Open Positions | {len(positions)} legs |
          | Total Closed Trades | {closed} |
          | Win Rate | {win_rate:.1f}% |
          | Profit Factor | {pf:.2f} |
          | Total Realized P/L | \${total_pnl:,.2f} |

          ### Validation Experiment
          | Metric | Value |
          |--------|-------|
          | Validation Trades | {validation_count}/30 |
          | Status | {\"IN PROGRESS\" if validation_count < 30 else \"COMPLETE - review kill criteria\"} |

          ### Action Required
          {\"None - system is trading autonomously.\" if validation_count < 30 else \"30 trades reached. Review kill criteria and decide: scale or redesign.\"}

          _Auto-generated by weekly-health-digest.yml_
          '''

          Path('artifacts/weekly_digest.md').parent.mkdir(parents=True, exist_ok=True)
          Path('artifacts/weekly_digest.md').write_text(body)
          print(body)
          "

      - name: Post digest as issue comment or create issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("artifacts/weekly_digest.md", "utf8");
            const title = "Weekly Trading Health Digest";
            const label = "weekly-digest";

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: "0E8A16",
                  description: "Weekly automated health digest",
                });
              }
            }

            // Find existing open digest issue
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
              per_page: 10,
            });

            const existing = issues.find(i => !i.pull_request && i.title === title);

            if (existing) {
              // Update existing
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated digest issue #${existing.number}`);
            } else {
              // Create new
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
              core.info(`Created digest issue #${created.data.number}`);
            }
