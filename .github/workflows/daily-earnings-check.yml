name: Daily Earnings Position Check

# CRITICAL: Prevents LL-191 from recurring
# Checks existing positions against earnings blackouts

on:
  schedule:
    - cron: "0 14 * * 1-5" # 9 AM ET weekdays
  workflow_dispatch:

permissions:
  contents: read

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  check-earnings:
    name: Check Positions for Earnings Risk
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install alpaca-py

      - name: Run Earnings Check
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: python scripts/check_earnings_positions.py
