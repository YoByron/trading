name: OpenRouter Price Monitor

on:
  schedule:
    # Run daily at 6am ET (11:00 UTC) — check before market open
    - cron: "0 11 * * *"
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Check OpenRouter pricing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/openrouter_price_monitor.py

      - name: Commit updated baseline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/openrouter_pricing_baseline.json 2>/dev/null; then
            echo "No pricing changes to commit"
          else
            BRANCH="chore/openrouter-pricing-baseline-${GITHUB_RUN_ID}"
            git switch -c "$BRANCH"
            git add data/openrouter_pricing_baseline.json
            git commit -m "chore: update OpenRouter pricing baseline [auto]"
            git push -u origin "$BRANCH"
            PR_BODY="Automated OpenRouter pricing baseline update from run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}."
            if gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: update OpenRouter pricing baseline" \
              --body "$PR_BODY"; then
              echo "Created pricing baseline PR for $BRANCH"
            else
              echo "::warning::Could not create PR with GITHUB_TOKEN; update branch pushed: $BRANCH"
              gh issue create \
                --title "OpenRouter pricing baseline update ready" \
                --body "$PR_BODY"$'\n\n'"Branch: $BRANCH" || true
            fi
          fi
