name: Trigger.dev Tests

on:
  push:
    paths:
      - "trigger/**"
      - "trigger.config.ts"
      - "package.json"
      - "tsconfig.json"
      - "vitest.config.ts"
  pull_request:
    paths:
      - "trigger/**"
      - "trigger.config.ts"
      - "package.json"
      - "tsconfig.json"
      - "vitest.config.ts"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run
