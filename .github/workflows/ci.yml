name: CI
on: [push, pull_request]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changed Paths
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      run_full_tests: ${{ steps.filter.outputs.run_full_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Decide test scope
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ -z "${base}" || "${base}" == "0000000000000000000000000000000000000000" ]]; then
            echo "Could not determine a safe diff base; running full test suite."
            echo "run_full_tests=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git diff --name-only "${base}" "${head}" | tee changed-files.txt

          if [[ ! -s changed-files.txt ]]; then
            echo "No changed files detected; running full test suite."
            echo "run_full_tests=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          safe_only=true
          while IFS= read -r path; do
            case "${path}" in
              .github/workflows/* | .github/dependabot.yml | .gitignore | .claude/*.json | docs/* | *.md)
                ;;
              data/system_state.json | data/runtime/intraday_pnl_history.json | data/runtime/intraday_pnl_latest.json)
                ;;
              data/north_star_weekly_history.json | data/runtime/north_star_gate_overrides.json | data/TRADING_HALTED)
                ;;
              data/analytics/perplexity_utilization_latest.json)
                ;;
              *)
                safe_only=false
                ;;
            esac
          done < changed-files.txt

          if [[ "${safe_only}" == "true" ]]; then
            echo "Only workflow/docs/config files changed; skipping full Python test suite."
            echo "run_full_tests=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Runtime-relevant files changed; running full Python test suite."
            echo "run_full_tests=true" >> "${GITHUB_OUTPUT}"
          fi

  trunk-check:
    name: Trunk Check
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # checks/pull-requests write are required for trunk-io/trunk-action to
    # post annotations to the PR. Without them the action returns exit 1 with
    # "Resource not accessible by integration" 403 (recurring noise on every
    # recent PR). Job-level permissions narrow the broader workflow scope.
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Cache Trunk artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/trunk
          key: ${{ runner.os }}-trunk-${{ github.ref_name }}-${{ hashFiles('.trunk/trunk.yaml') }}
          restore-keys: |
            ${{ runner.os }}-trunk-${{ github.ref_name }}-
            ${{ runner.os }}-trunk-
      - name: Trunk Check
        uses: trunk-io/trunk-action@75699af9e26881e564e9d832ef7dc3af25ec031b # v1
        with:
          trunk-token: ${{ secrets.TRUNK_API_TOKEN }}
          cache: "false"

  test-suite:
    name: Run All Tests
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Explain test scope
        run: |
          echo "run_full_tests=${{ needs.changes.outputs.run_full_tests }}"

      - name: Skip full test suite
        if: needs.changes.outputs.run_full_tests != 'true'
        run: |
          echo "Skipping full Python test suite for workflow/docs/config-only changes."

      - name: Checkout
        if: needs.changes.outputs.run_full_tests == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        if: needs.changes.outputs.run_full_tests == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        if: needs.changes.outputs.run_full_tests == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-

      - name: Install CI dependencies
        if: needs.changes.outputs.run_full_tests == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run test runner
        if: needs.changes.outputs.run_full_tests == 'true'
        env:
          PYTHON_BIN: python
          REPORT_DIR: artifacts/test-reports
        run: |
          chmod +x scripts/ci/run_all_tests.sh
          bash scripts/ci/run_all_tests.sh

      - name: Upload test artifacts
        if: always() && needs.changes.outputs.run_full_tests == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ci-test-artifacts
          retention-days: 7
          path: |
            coverage.xml
            .coverage
            artifacts/test-reports/**

  validate-workflows:
    name: Validate Workflows
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Validate workflow YAML
        run: sh scripts/validate_yaml_before_commit.sh

      - name: Run workflow regression tests
        run: |
          pytest \
            tests/test_ci_runner_wiring.py \
            tests/test_workflow_contracts.py \
            tests/test_workflow_dependencies.py \
            tests/test_workflow_integrity.py \
            -q
