title: "SPY Options Validation Platform"
description: "Broker-backed SPY options validation platform with hard risk gates, paired-trade accounting, and live operator surfaces."
url: "https://igorganapolsky.github.io"
baseurl: "/trading"
lang: en

theme: minima
permalink: /:year/:month/:day/:title/
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

header_pages:
  - rag-query.html
  - blog.html

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Igor Ganapolsky"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
