                                        - /url: "#current-operating-truth"
                                        - img [ref=e960]
                                - paragraph [ref=e962]: The system is not positioned as a finished black-box profit engine.
                                - paragraph [ref=e963]: "It is currently:"
                                - list [ref=e964]:
                                    - listitem [ref=e965]: validating a defined-risk SPY options process in paper
                                    - listitem [ref=e966]: using weekly gates to block scale until there is enough paired closed-trade evidence
                                    - listitem [ref=e967]: using a broker-backed scorecard to separate realized activity, open-position repricing, and paired closed-trade outcomes
                                - paragraph [ref=e968]: "It is not currently:"
                                - list [ref=e969]:
                                    - listitem [ref=e970]: a fully validated live strategy
                                    - listitem [ref=e971]: a claim of proven profitability
                                    - listitem [ref=e972]: a hands-off capital allocator that should be trusted without supervision
                                - paragraph [ref=e973]: If you want the latest numbers, use the live artifacts and dashboards, not hardcoded README badges.
                                - separator [ref=e974]
                                - generic [ref=e975]:
                                    - heading "System Design" [level=2] [ref=e976]
                                    - 'link "Permalink: System Design" [ref=e977] [cursor=pointer]':
                                        - /url: "#system-design"
                                        - img [ref=e978]
                                - paragraph [ref=e980]: "The core architecture is built around five layers:"
                                - list [ref=e981]:
                                    - listitem [ref=e982]:
                                        - paragraph [ref=e983]:
                                            - strong [ref=e984]: Execution and Brokerage
                                        - list [ref=e985]:
                                            - listitem [ref=e986]: Alpaca is the primary broker and execution source of truth.
                                            - listitem [ref=e987]: Daily scorecards read broker state directly.
                                    - listitem [ref=e988]:
                                        - paragraph [ref=e989]:
                                            - strong [ref=e990]: Trade Safety
                                        - list [ref=e991]:
                                            - listitem [ref=e992]: Pre-trade gates enforce ticker restrictions, volatility/risk conditions, and weekly operating constraints.
                                            - listitem [ref=e993]: Defined-risk structures only.
                                    - listitem [ref=e994]:
                                        - paragraph [ref=e995]:
                                            - strong [ref=e996]: Paired-Trade Accounting
                                        - list [ref=e997]:
                                            - listitem [ref=e998]: The system distinguishes fill flow from completed paired closed trades.
                                            - listitem [ref=e999]: Expectancy and scale decisions are supposed to come from paired outcomes, not raw order noise.
                                    - listitem [ref=e1000]:
                                        - paragraph [ref=e1001]:
                                            - strong [ref=e1002]: RAG and Learning
                                        - list [ref=e1003]:
                                            - listitem [ref=e1004]: Lessons learned are stored and retrieved for operator context.
                                            - listitem [ref=e1005]: Always-on workflows refresh ingest, retraining, and proof artifacts.
                                    - listitem [ref=e1006]:
                                        - paragraph [ref=e1007]:
                                            - strong [ref=e1008]: Operational Proof
                                        - list [ref=e1009]:
                                            - listitem [ref=e1010]: GitHub Actions, smoke checks, workflow validation, and broker-backed artifacts provide evidence for system state.
