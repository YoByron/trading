                                        - img [ref=e924]
                                - paragraph [ref=e926]: "This repository is a trading systems lab focused on one narrow problem:"
                                - list [ref=e927]:
                                    - listitem [ref=e928]: validate a repeatable SPY options playbook in paper trading
                                    - listitem [ref=e929]: enforce risk controls before any order is sent
                                    - listitem [ref=e930]: track outcomes with broker-backed evidence
                                    - listitem [ref=e931]: feed lessons back into retrieval and learning workflows
                                - paragraph [ref=e932]: "The project target is still the same:"
                                - list [ref=e933]:
                                    - listitem [ref=e934]:
                                        - strong [ref=e935]: North Star
                                        - text: ":"
                                        - code [ref=e936]: $6,000/month
                                        - text: after tax
                                    - listitem [ref=e937]:
                                        - strong [ref=e938]: Target capital base
                                        - text: ":"
                                        - code [ref=e939]: $300,000
                                - paragraph [ref=e940]: "But the repo should be understood for what it actually is today:"
                                - list [ref=e941]:
                                    - listitem [ref=e942]:
                                        - strong [ref=e943]: paper-first validation infrastructure
                                    - listitem [ref=e944]:
                                        - strong [ref=e945]: live trading inactive by default
                                    - listitem [ref=e946]:
                                        - strong [ref=e947]: edge not yet verified for scaling
                                - paragraph [ref=e948]: "Current gate state and evidence live in the canonical ledgers and generated public bundle, not in this README:"
                                - list [ref=e949]:
                                    - listitem [ref=e950]:
                                        - link "docs/data/public_status.json" [ref=e951] [cursor=pointer]:
                                            - /url: /IgorGanapolsky/trading/blob/main/Users/igorganapolsky/workspace/git/igor/trading/.worktrees/gsd-learning-freshness-guard/docs/data/public_status.json
